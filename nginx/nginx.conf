worker_processes auto;

# Khai báo biến môi trường cho Lua
env JWT_SECRET_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    # Shared memory zones
    lua_shared_dict limit_req_store 10m;
    lua_shared_dict ip_blacklist    10m;
    lua_shared_dict jwt_cache       10m;

    client_max_body_size 10m;

    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    # Khai báo địa chỉ DNS nội bộ của Docker (127.0.0.11)
    # Valid=30s để Nginx liên tục hỏi lại IP mới (rất tốt khi scale)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # -------------------------------------------------------
    # SERVER 1: HTTP (port 80)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location /health/ {
            # CHUYỂN proxy_pass SANG DẠNG BIẾN (RUNTIME)
            set $upstream_app app;
            proxy_pass         http://$upstream_app:8000;
            
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # SERVER 2: HTTPS (port 443)
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /health/ {
            # CHUYỂN proxy_pass SANG DẠNG BIẾN
            set $upstream_app app;
            proxy_pass         http://$upstream_app:8000;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        location /static/ {
            # CHUYỂN proxy_pass SANG DẠNG BIẾN
            set $upstream_app app;
            proxy_pass         http://$upstream_app:8000;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        location /media/ {
            # CHUYỂN proxy_pass SANG DẠNG BIẾN
            set $upstream_app app;
            proxy_pass         http://$upstream_app:8000;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        location / {
            access_by_lua_block {
                require("1_bad_bot").run()
                require("2_rate_limit").run()
                require("3_ip_blacklist").run()
                require("4_waf_sqli_xss").run()
                require("5_jwt_auth").run()
            }

            # CHUYỂN proxy_pass SANG DẠNG BIẾN Ở LOCATION CHÍNH
            set $upstream_app app;
            proxy_pass         http://$upstream_app:8000;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }
    }
}