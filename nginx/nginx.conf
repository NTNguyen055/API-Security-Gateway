worker_processes auto;

# Cho phép Lua đọc biến môi trường
env JWT_SECRET_KEY;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # 🔥 FIX 1: đúng path module Lua của bạn
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Shared memory (non-blocking)
    lua_shared_dict limit_req_store 10m;
    lua_shared_dict ip_blacklist    10m;
    lua_shared_dict jwt_cache       10m;

    client_max_body_size 10m;

    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # -------------------------------------------------------
    # SERVER HTTP (80)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location /health/ {
            set $upstream_app app;
            proxy_pass http://$upstream_app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # SERVER HTTPS (443)
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---------------- HEALTH ----------------
        location /health/ {
            set $upstream_app app;
            proxy_pass http://$upstream_app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            access_log off;
        }

        # ---------------- STATIC ----------------
        location /static/ {
            set $upstream_app app;
            proxy_pass http://$upstream_app:8000;

            access_log off;
        }

        # ---------------- MEDIA ----------------
        location /media/ {
            set $upstream_app app;
            proxy_pass http://$upstream_app:8000;

            access_log off;
        }

        # ---------------- MAIN ----------------
        location / {

            # 🔥 FIX 2: require module đúng chuẩn + cache module
            access_by_lua_block {
                local bad_bot       = require("1_bad_bot")
                local rate_limit    = require("2_rate_limit")
                local blacklist     = require("3_ip_blacklist")
                local waf           = require("4_waf_sqli_xss")
                local jwt           = require("5_jwt_auth")

                bad_bot.run()
                rate_limit.run()
                blacklist.run()
                waf.run()
                jwt.run()
            }

            set $upstream_app app;
            proxy_pass http://$upstream_app:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }
    }
}