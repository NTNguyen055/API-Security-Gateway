version: '3.8'

# =============================================================================
# Adaptive Web Security Gateway — docker-compose.yml
# =============================================================================
#
# Topology:
#   [Internet] → gateway (80/443) → app (8000) → RDS MySQL
#                                 → redis (6379)  [internal only]
#
# Network: tất cả services trong "internal" bridge
#          chỉ gateway expose port ra host
# =============================================================================

services:

  # ===========================================================================
  # DJANGO APPLICATION
  # ===========================================================================
  app:
    image: ntnguyen055/api-security-app:latest
    container_name: docapp_django
    restart: unless-stopped

    expose:
      - "8000"

    # FIX: chỉ dùng env_file, bỏ khối environment: riêng để tránh duplicate
    env_file:
      - /home/ubuntu/appointment-web/.env

    depends_on:
      redis:
        condition: service_healthy

    command: >
      sh -c "
        echo '[APP] Waiting for DB migration...' &&
        until python manage.py migrate --noinput; do
          echo '[APP] Migration failed, retrying in 5s...' && sleep 5;
        done &&
        echo '[APP] Running collectstatic...' &&
        python manage.py collectstatic --noinput &&
        echo '[APP] Starting gunicorn...' &&
        exec gunicorn docappsystem.wsgi:application
          --bind 0.0.0.0:8000
          --workers 2
          --threads 2
          --timeout 60
          --max-requests 1000
          --max-requests-jitter 100
          --access-logfile -
          --error-logfile -
          --log-level info
      "

    # FIX: dùng python thay vì curl (image Django không đảm bảo có curl)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

    # NÂNG CẤP: giới hạn tài nguyên để tránh OOM ảnh hưởng toàn hệ thống
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - internal


  # ===========================================================================
  # REDIS — rate limiting, blacklist cache, JWT cache, geo cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: unless-stopped

    # NÂNG CẤP: tăng maxmemory lên 128mb để đủ cho tất cả shared dict
    # Lua shared dicts dùng OS memory riêng, Redis dùng container memory
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
      --loglevel warning

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    deploy:
      resources:
        limits:
          memory: 160m
          cpus: "0.5"
        reservations:
          memory: 64m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - internal


  # ===========================================================================
  # OPENRESTY GATEWAY — security pipeline, TLS termination
  # ===========================================================================
  gateway:
    image: ntnguyen055/api-security-gateway:latest
    container_name: openresty_gateway
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:9145:9145"   # Prometheus metrics — internal only

    # FIX: chỉ dùng env_file, xóa khối environment: duplicate
    # Tất cả biến gateway cần đã có trong .env
    env_file:
      - /home/ubuntu/appointment-web/.env

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro         # TLS certs
      - /var/www/html:/var/www/html:ro               # ACME challenge
      - ./logs/nginx:/usr/local/openresty/nginx/logs # Nginx logs

    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

    # NÂNG CẤP: healthcheck thêm X-Forwarded-Proto để tránh redirect loop
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-sf"
        - "--max-time"
        - "4"
        - "-A"
        - "HealthChecker/1.0"
        - "-H"
        - "Host: dacn3.duckdns.org"
        - "-H"
        - "X-Forwarded-For: 127.0.0.1"
        - "-H"
        - "X-Forwarded-Proto: https"
        - "http://localhost/health/"
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1.0"
        reservations:
          memory: 128m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

    networks:
      - internal


# =============================================================================
# NETWORKS
# =============================================================================
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24   # NÂNG CẤP: subnet cố định, dễ quản lý firewall


# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    driver: local
