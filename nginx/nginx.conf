worker_processes auto;

env JWT_SECRET_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    lua_socket_log_errors off;

    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;

    resolver 127.0.0.11 ipv6=off;

    client_max_body_size 10m;

    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    init_by_lua_block {
        -- Prometheus
        prometheus = require("prometheus").init("prometheus_metrics")
        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Tổng số HTTP request",
            {"host", "status"}
        )
        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Latency của request (giây)",
            {"host"},
            {0.005, 0.01, 0.05, 0.1, 0.5, 1, 5}
        )
        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Tổng số request bị block",
            {"reason"}
        )

        -- Preload security modules
        bad_bot      = require "1_bad_bot"
        rate_limit   = require "2_rate_limit"
        ip_blacklist = require "3_ip_blacklist"
        waf          = require "4_waf_sqli_xss"
        jwt_auth     = require "5_jwt_auth"
    }

    log_by_lua_block {
        metric_requests:inc(1, {ngx.var.server_name, ngx.var.status})
        metric_latency:observe(
            tonumber(ngx.var.request_time),
            {ngx.var.server_name}
        )
    }

    # -------------------------------------------------------
    # SERVER 1: HTTP (port 80)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location /health/ {
            proxy_pass http://app:8000;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # SERVER 2: HTTPS (port 443) — Adaptive Security Gateway
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Prometheus metrics — bảo vệ bằng IP whitelist
        # Thay YOUR_HOME_IP bằng IP thực (curl https://ifconfig.me)
        location /metrics {
            allow YOUR_HOME_IP/32;
            allow 127.0.0.1;
            deny  all;
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }

        location /health/ { proxy_pass http://app:8000; access_log off; }
        location /static/ { proxy_pass http://app:8000; access_log off; }
        location /media/  { proxy_pass http://app:8000; access_log off; }

        # ── Main gateway — pipeline bảo mật đúng chuẩn ──
        location / {
            access_by_lua_block {
                -- Mỗi module trả về status code nếu cần block, nil nếu cho qua.
                -- KHÔNG dùng pcall vì pcall bắt ngx.exit() làm vô hiệu hóa block.
                -- Thay vào đó mỗi module return status code, nginx.conf gọi ngx.exit().

                local code

                code = bad_bot.run()
                if code then return ngx.exit(code) end

                code = rate_limit.run()
                if code then return ngx.exit(code) end

                code = ip_blacklist.run()
                if code then return ngx.exit(code) end

                code = waf.run()
                if code then return ngx.exit(code) end

                code = jwt_auth.run()
                if code then return ngx.exit(code) end
            }

            proxy_pass http://app:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
