worker_processes auto;

env JWT_SECRET_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # 🔥 tránh spam log từ lua socket (redis/http)
    lua_socket_log_errors off;

    # Shared memory
    lua_shared_dict limit_req_store 10m;
    lua_shared_dict ip_blacklist    10m;
    lua_shared_dict jwt_cache       10m;

    resolver 127.0.0.11 ipv6=off;

    client_max_body_size 10m;

    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    # 🔥 preload modules (tối ưu performance)
    init_by_lua_block {
        bad_bot      = require "1_bad_bot"
        rate_limit   = require "2_rate_limit"
        ip_blacklist = require "3_ip_blacklist"
        waf          = require "4_waf_sqli_xss"
        jwt_auth     = require "5_jwt_auth"
    }

    # ---------------- HTTP ----------------
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location /health/ {
            proxy_pass http://app:8000;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------- HTTPS ----------------
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # ---------- bypass ----------
        location /health/ { proxy_pass http://app:8000; access_log off; }
        location /static/ { proxy_pass http://app:8000; access_log off; }
        location /media/  { proxy_pass http://app:8000; access_log off; }

        # ---------- main gateway ----------
        location / {
            access_by_lua_block {
                -- 🔥 protect toàn pipeline (tránh crash 500)
                local ok, err

                ok, err = pcall(bad_bot.run)
                if not ok then ngx.log(ngx.ERR, "[BAD_BOT ERROR] ", err) end

                ok, err = pcall(rate_limit.run)
                if not ok then ngx.log(ngx.ERR, "[RATE_LIMIT ERROR] ", err) end

                ok, err = pcall(ip_blacklist.run)
                if not ok then ngx.log(ngx.ERR, "[BLACKLIST ERROR] ", err) end

                ok, err = pcall(waf.run)
                if not ok then ngx.log(ngx.ERR, "[WAF ERROR] ", err) end

                ok, err = pcall(jwt_auth.run)
                if not ok then ngx.log(ngx.ERR, "[JWT ERROR] ", err) end
            }

            proxy_pass http://app:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}