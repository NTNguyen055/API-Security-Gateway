worker_processes auto;

env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # ================= REAL IP (FIX QUAN TRỌNG) =================
    # ❗ CHỈ TRUST proxy nội bộ (Docker / LB)
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.16.0.0/12;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_socket_log_errors off;

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;
    lua_shared_dict rl_counter          5m;
    lua_shared_dict geo_cache           20m;
    lua_shared_dict redis_down          1m;

    resolver 127.0.0.11 ipv6=off valid=30s;

    # ================= LIMIT =================
    client_max_body_size 10m;
    client_body_buffer_size 128k;   # ✅ FIX cho WAF

    keepalive_timeout 15;

    # ================= GZIP =================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ================= LOG =================
    log_format security '$remote_addr realip="$http_x_real_ip" xff="$http_x_forwarded_for" '
                        '[$time_local] "$request" $status '
                        '"$http_user_agent" rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LUA INIT =================
    init_by_lua_block {
        bad_bot           = require "bad_bot"
        rate_limit        = require "rate_limit"
        rate_limit_redis  = require "rate_limit_redis"
        ip_blacklist      = require "ip_blacklist"
        waf               = require "waf_sqli_xss"
        jwt_auth          = require "jwt_auth"
        geo_block         = require "geo_block"
        xff_guard         = require "xff_guard"
        risk_engine       = require "risk_engine"
    }

    init_worker_by_lua_block {
        local prometheus_lib = require "prometheus"
        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total", "Total HTTP requests", {"host","status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds", "Latency", {"host"},
            {0.005,0.01,0.05,0.1,0.5,1,5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total", "Blocked", {"reason"}
        )
    }

    log_by_lua_block {
        metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.host})
    }

    # ================= METRICS =================
    server {
        listen 127.0.0.1:9145;

        location /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }
    }

    # ================= HTTP =================
    server {
        listen 80;
        server_name _;

        location = /health/ {
            return 200 "OK";
        }

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS =================
    server {
        listen 443 ssl http2;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        # ================= SECURITY HEADERS =================
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        add_header Content-Security-Policy
        "default-src 'self'; img-src 'self' data:;
         script-src 'self' 'unsafe-inline';
         style-src 'self' 'unsafe-inline'" always;

        # ================= HEALTH =================
        location = /health/ {
            proxy_pass http://app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;   # ✅ FIX spoof
            proxy_set_header X-Forwarded-Proto $scheme;

            access_log off;
        }

        # ================= MAIN =================
        location / {

            lua_need_request_body on;

            access_by_lua_block {

                local modules = {
                    {ip_blacklist, "ip_blacklist"},
                    {xff_guard,    "xff_guard"},
                    {geo_block,    "geo_block"},
                    {bad_bot,      "bad_bot"},
                    {rate_limit,   "rate_limit"},
                    {rate_limit_redis, "rate_limit_redis"},
                    {waf,          "waf"},
                    {jwt_auth,     "jwt"},
                    {risk_engine,  "risk_engine"}
                }

                for _, m in ipairs(modules) do
                    local ok, res = pcall(m[1].run)

                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] Crash: ", m[2], " err=", res)
                    elseif res then
                        metric_blocked:inc(1, {m[2]})
                        return ngx.exit(res)
                    end
                end
            }

            proxy_pass http://app:8000;

            # ================= PROXY OPTIMIZATION =================
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_buffers 8 16k;
            proxy_buffer_size 32k;

            # ================= HEADER FIX (QUAN TRỌNG) =================
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;  # ✅ FIX spoof chain
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}