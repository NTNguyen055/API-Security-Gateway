version: "3.9"

services:

  app:
    image: ntnguyen055/api-security-app:latest
    container_name: docapp_django
    restart: unless-stopped

    expose:
      - "8000"

    env_file:
      - /home/ubuntu/appointment-web/.env

    environment:
      - TZ=Asia/Ho_Chi_Minh

    networks:
      - backend

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s


  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: unless-stopped

    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass Banhmi1234o   

    volumes:
      - redis_data:/data  

    environment:
      - TZ=Asia/Ho_Chi_Minh

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=Banhmi1234o redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3


  gateway:
    image: ntnguyen055/api-security-gateway:latest
    container_name: openresty_gateway
    restart: unless-stopped

    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "127.0.0.1:9145:9145"

    env_file:
      - /home/ubuntu/appointment-web/.env

    environment:
      - TZ=Asia/Ho_Chi_Minh

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html:ro

    networks:
      - backend

    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    # 🔥 HARDEN CONTAINER
    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-A", "HealthChecker/1.0",
             "http://127.0.0.1/health/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

    # 🔥 RESOURCE LIMIT
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

networks:
  backend:
    driver: bridge

volumes:
  redis_data: