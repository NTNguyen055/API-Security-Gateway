# =============================================================================
# Adaptive Web Security Gateway — nginx.conf
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

# ================= ENV DECLARATIONS =================
# Tất cả biến env dùng trong Lua phải khai báo ở đây
env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;
env RISK_BLOCK_THRESHOLD;   # FIX: thiếu trong bản cũ → risk_engine luôn dùng default
env RISK_LIMIT_THRESHOLD;   # FIX: thiếu trong bản cũ → risk_engine luôn dùng default

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        on;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Ẩn version nginx khỏi response header ──────────────────
    server_tokens off;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_socket_log_errors off;

    # ================= REAL IP =================
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Tin tưởng localhost và tất cả Docker bridge subnet phổ biến
    set_real_ip_from  127.0.0.1;
    set_real_ip_from  172.16.0.0/12;   # FIX: bao phủ 172.16-31.x.x thay vì chỉ 172.17
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  10.0.0.0/8;

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store    10m;
    lua_shared_dict ip_blacklist       10m;
    lua_shared_dict jwt_cache          10m;
    lua_shared_dict prometheus_metrics 10m;
    lua_shared_dict rl_counter         10m;  # tăng từ 5m, dùng chung cho throttle + counter
    lua_shared_dict geo_cache          20m;

    resolver 127.0.0.11 ipv6=off valid=30s;

    # ================= REQUEST LIMITS =================
    client_max_body_size    10m;
    client_body_buffer_size 256k;
    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            10s;

    # ================= LOG FORMAT =================
    # FIX: thêm $http_x_forwarded_for và $request_id để forensics tốt hơn
    log_format security '$remote_addr [$time_local] "$request" $status '
                        'rt=$request_time xff="$http_x_forwarded_for" '
                        'ua="$http_user_agent" rid=$request_id';

    access_log /usr/local/openresty/nginx/logs/access.log security buffer=16k flush=5s;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LOAD LUA MODULES =================
    init_by_lua_block {
        # Load tất cả module một lần tại master process
        # Worker fork từ đây, shared dict đã sẵn sàng
        ip_blacklist     = require "ip_blacklist"
        xff_guard        = require "xff_guard"
        geo_block        = require "geo_block"
        bad_bot          = require "bad_bot"
        rate_limit       = require "rate_limit"
        rate_limit_redis = require "rate_limit_redis"
        waf              = require "waf_sqli_xss"
        jwt_auth         = require "jwt_auth"
        risk_engine      = require "risk_engine"

        ngx.log(ngx.NOTICE, "[GATEWAY] All security modules loaded OK")
    }

    # ================= PROMETHEUS =================
    init_worker_by_lua_block {
        local ok, prometheus_lib = pcall(require, "prometheus")
        if not ok then
            ngx.log(ngx.ERR, "[PROMETHEUS] load failed: ", prometheus_lib)
            return
        end

        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Total HTTP requests",
            {"host", "status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Request latency",
            {"host"},
            {0.005, 0.01, 0.05, 0.1, 0.5, 1, 5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Blocked requests by security module",
            {"reason"}
        )

        # NÂNG CẤP: thêm metric risk score distribution
        metric_risk = prometheus:histogram(
            "nginx_security_risk_score",
            "Request risk score distribution",
            {"action"},
            {0, 10, 20, 30, 50, 70, 80, 100}
        )
    }

    # ── Log Prometheus metrics sau mỗi request ──────────────────
    log_by_lua_block {
        if metric_requests then
            metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        end

        if metric_latency then
            metric_latency:observe(tonumber(ngx.var.request_time) or 0, {ngx.var.host})
        end

        # Ghi risk score nếu có
        if metric_risk and ngx.ctx.security then
            local risk   = ngx.ctx.security.risk_final or 0
            local action = ngx.ctx.security.risk_action or "pass"
            metric_risk:observe(risk, {action})
        end
    }

    # =============================================================================
    # SERVER: PROMETHEUS METRICS (internal only)
    # =============================================================================
    server {
        listen 127.0.0.1:9145;

        location /metrics {
            allow 127.0.0.1;
            deny  all;

            content_by_lua_block {
                if prometheus then
                    prometheus:collect()
                else
                    ngx.exit(503)
                end
            }

            access_log off;
        }

        location / { return 404; }
    }

    # =============================================================================
    # SERVER: HTTP → HTTPS REDIRECT
    # =============================================================================
    server {
        listen      80;
        server_name dacn3.duckdns.org;

        # Health check cho Docker/Jenkins — không redirect, trả lời thẳng
        location = /health/ {
            add_header X-Forwarded-Proto "http";
            return 200 "OK";
            access_log off;
        }

        # ACME challenge cho Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Tất cả traffic khác → redirect HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # SERVER: HTTPS (MAIN)
    # =============================================================================
    server {
        listen      443 ssl;
        server_name dacn3.duckdns.org;

        # ── TLS ─────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # NÂNG CẤP: cipher suite cụ thể hơn thay vì "HIGH"
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;    # NÂNG CẤP: tắt session tickets bảo mật hơn

        # NÂNG CẤP: OCSP stapling giảm latency TLS handshake
        ssl_stapling        on;
        ssl_stapling_verify on;
        
        # Đã khai báo resolver ở block http, nên có thể xóa dòng này để tránh trùng lặp
        # resolver            127.0.0.11 valid=300s ipv6=off;

        # ── SECURITY HEADERS ─────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                  always;
        add_header X-Content-Type-Options    "nosniff"                     always;
        add_header X-Request-ID              $request_id                   always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # FIX: CSP cho phép S3 nếu USE_S3=True
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.amazonaws.com; font-src 'self' data:; connect-src 'self';"
            always;

        # ── HEALTH CHECK ─────────────────────────────────────────
        location = /health/ {
            set $upstream_app http://app:8000;
            proxy_pass             $upstream_app;
            
            proxy_set_header Host  $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_connect_timeout  3s;
            proxy_read_timeout     3s;
            access_log off;
        }

        # ── STATIC / MEDIA ───────────────────────────────────────
        location /static/ {
            set $upstream_app http://app:8000;
            proxy_pass   $upstream_app;
            
            proxy_cache_valid 200 1d;
            access_log   off;
        }

        location /media/ {
            set $upstream_app http://app:8000;
            proxy_pass   $upstream_app;
            
            access_log   off;
        }

        # ── ADMIN: restrict thêm ─────────────────────────────────
        location /admin/ {
            access_by_lua_block {
                local ctx = { security = { risk = 0 }, admin_path = true }

                local modules = {
                    xff_guard,
                    ip_blacklist,
                    bad_bot,
                    rate_limit,
                    jwt_auth,
                    waf,
                }

                for _, m in ipairs(modules) do
                    if ctx.security.block then break end
                    local ok, err = pcall(m.run, ctx)
                    if not ok then
                        ngx.log(ngx.ERR, "[ADMIN][SECURITY] crash: ", err)
                    end
                end

                local ok, err = pcall(risk_engine.run, ctx)
                if not ok then
                    ngx.log(ngx.ERR, "[ADMIN][RISK] crash: ", err)
                end

                local action = (ctx.security and ctx.security.risk_action) or ""
                if ctx.security.block or action == "block" then
                    ngx.log(ngx.WARN, "[ADMIN] Blocked ip=",
                        (ctx.security.client_ip or ngx.var.remote_addr))
                    return ngx.exit(403)
                end
                if action == "limit" then
                    return ngx.exit(429)
                end

                ngx.ctx.security = ctx.security
            }

            set $upstream_app http://app:8000;
            proxy_pass             $upstream_app;
            
            proxy_http_version     1.1;
            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     10s;
        }

        # ── SECURITY PIPELINE (main) ─────────────────────────────
        location / {
            access_by_lua_block {

                local ctx = { security = { risk = 0 } }

                local modules = {
                    xff_guard,        
                    ip_blacklist,     
                    geo_block,        
                    bad_bot,          
                    rate_limit,       
                    rate_limit_redis, 
                    waf,              
                    jwt_auth,         
                }

                for _, m in ipairs(modules) do
                    if ctx.security.block then
                        break
                    end

                    local ok, err = pcall(m.run, ctx)
                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] module crash: ", err)
                    end
                end

                local ok, err = pcall(risk_engine.run, ctx)
                if not ok then
                    ngx.log(ngx.ERR, "[RISK] crash: ", err)
                end

                ngx.ctx.security = ctx.security

                local action = (ctx.security and ctx.security.risk_action) or ""

                if ctx.security.block or action == "block" then
                    ngx.log(ngx.WARN,
                        "[GATEWAY] BLOCKED ip=", (ctx.security.client_ip or ngx.var.remote_addr),
                        " signals=[", table.concat(ctx.security.signals or {}, ","), "]"
                    )
                    return ngx.exit(403)
                end

                if action == "limit" then
                    return ngx.exit(429)
                end
            }

            set $upstream_app http://app:8000;
            proxy_pass         $upstream_app;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            proxy_buffering    on;
            proxy_buffers      16 16k;
            proxy_buffer_size  32k;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }
    }
}