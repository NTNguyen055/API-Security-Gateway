# =============================================================================
# Adaptive Web Security Gateway — docker-compose.yml
# =============================================================================

services:

  # ===========================================================================
  # DJANGO APPLICATION
  # ===========================================================================
  app:
    image: ntnguyen055/api-security-app:latest
    container_name: docapp_django
    restart: unless-stopped

    expose:
      - "8000"

    env_file:
      - /home/ubuntu/appointment-web/.env

    depends_on:
      redis:
        condition: service_healthy

  # FIX: Đổi từ 'curl' sang 'python urllib' vì Image Django đã được tối ưu gỡ bỏ curl
    healthcheck:
      test: 
        - "CMD-SHELL"
        - "python -c \"import urllib.request; req = urllib.request.Request('http://127.0.0.1:8000/health/', headers={'X-Forwarded-Proto': 'https', 'Host': 'localhost'}); urllib.request.urlopen(req)\" || exit 1"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      
    # FIX 2: Bỏ collectstatic để tăng tốc độ boot. Chỉ giữ lại migrate và Gunicorn.
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      gunicorn docappsystem.wsgi:application 
      --bind 0.0.0.0:8000 
      --workers 2 
      --threads 2 
      --timeout 60 
      --max-requests 1000 
      --max-requests-jitter 100 
      --access-logfile - 
      --error-logfile - 
      --log-level info
      "

    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - internal


  # ===========================================================================
  # REDIS
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: unless-stopped

    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
      --loglevel warning

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    deploy:
      resources:
        limits:
          memory: 160m
          cpus: "0.5"
        reservations:
          memory: 64m

    networks:
      - internal


  # ===========================================================================
  # OPENRESTY GATEWAY
  # ===========================================================================
  gateway:
    image: ntnguyen055/api-security-gateway:latest
    container_name: openresty_gateway
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:9145:9145"

    env_file:
      - /home/ubuntu/appointment-web/.env

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html:ro
      - ./logs/nginx:/usr/local/openresty/nginx/logs

    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 4 -H 'Host: dacn3.duckdns.org' -H 'X-Forwarded-Proto: https' http://127.0.0.1/health/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    networks:
      - internal


# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  redis_data:
    driver: local