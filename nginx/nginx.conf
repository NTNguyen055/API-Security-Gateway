worker_processes auto;

env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_socket_log_errors off;

    # ================= REAL IP =================
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.17.0.0/16;
    real_ip_recursive on;

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;
    lua_shared_dict rl_counter          5m;
    lua_shared_dict geo_cache           20m;
    lua_shared_dict rl_cache            10m; # [FIX] Đã thêm rl_cache cho rate_limit_redis

    resolver 127.0.0.11 ipv6=off;

    client_max_body_size 10m;
    client_body_buffer_size 256k;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ================= LOG =================
    log_format security '$remote_addr [$time_local] "$request" $status '
                        '"$http_user_agent" rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LOAD LUA MODULE =================
    init_by_lua_block {
        ip_blacklist      = require "ip_blacklist"
        xff_guard         = require "xff_guard"
        geo_block         = require "geo_block"
        bad_bot           = require "bad_bot"
        rate_limit        = require "rate_limit"
        rate_limit_redis  = require "rate_limit_redis"
        waf               = require "waf_sqli_xss"
        jwt_auth          = require "jwt_auth"
        risk_engine       = require "risk_engine"
    }

    # ================= PROMETHEUS =================
    init_worker_by_lua_block {
        local ok, prometheus_lib = pcall(require, "prometheus")
        if not ok then
            ngx.log(ngx.ERR, "[PROMETHEUS] load failed: ", prometheus_lib)
            return
        end

        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Total HTTP requests",
            {"host", "status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Request latency",
            {"host"},
            {0.005,0.01,0.05,0.1,0.5,1,5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Blocked requests",
            {"reason"}
        )
    }

    log_by_lua_block {
        if metric_requests then
            metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        end

        if metric_latency then
            metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.host})
        end
    }

    # ================= METRICS (SECURED) =================
    server {
        listen 127.0.0.1:9145;

        location /metrics {
            allow 127.0.0.1;
            deny all;

            content_by_lua_block {
                prometheus:collect()
            }

            access_log off;
        }

        location / { return 404; }
    }

    # ================= HTTP (REDIRECT) =================
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location = /health/ {
            return 200 "OK";
            access_log off;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS =================
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ================= SECURITY HEADERS =================
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "default-src 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ================= HEALTH =================
        location = /health/ {
            proxy_pass http://app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            access_log off;
        }

        location /static/ { proxy_pass http://app:8000; access_log off; }
        location /media/  { proxy_pass http://app:8000; access_log off; }

        # ================= SECURITY PIPELINE =================
        location / {
            access_by_lua_block {

                local ctx = { security = { risk = 0 } }

                local modules = {
                    xff_guard,
                    ip_blacklist,
                    geo_block,
                    bad_bot,
                    jwt_auth,
                    waf,
                    rate_limit,
                    rate_limit_redis
                }

                for _, m in ipairs(modules) do
                    if ctx.security.block or ctx.security.rate_limit_hard then
                        break
                    end

                    local ok, err = pcall(m.run, ctx)
                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] module crash: ", err)
                        -- [FIX] Fail-Closed: Chặn luôn nếu module WAF bị crash
                        ngx.status = ngx.HTTP_INTERNAL_SERVER_ERROR
                        ngx.say("500 Internal Server Error (Security Gateway Error)")
                        return ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
                    end
                end

                local blocked = ctx.security.block

                local ok, err = pcall(risk_engine.run, ctx)
                if not ok then
                    ngx.log(ngx.ERR, "[RISK] crash: ", err)
                end

                if blocked then
                    return ngx.exit(403)
                end
            }

            proxy_pass http://app:8000;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}