worker_processes auto;

env JWT_SECRET_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_socket_log_errors off;

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;

    resolver 127.0.0.11 ipv6=off;
    client_max_body_size 10m;

    # ================= LOG =================
    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LOAD MODULE =================
    init_by_lua_block {
        bad_bot      = require "bad_bot"
        rate_limit   = require "rate_limit"
        ip_blacklist = require "ip_blacklist"
        waf          = require "waf_sqli_xss"
        jwt_auth     = require "jwt_auth"
    }

    # ================= PROMETHEUS =================
    init_worker_by_lua_block {
        prometheus = require("prometheus").init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Tong so HTTP request",
            {"host", "status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Latency cua request (giay)",
            {"host"},
            {0.005, 0.01, 0.05, 0.1, 0.5, 1, 5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Tong so request bi block",
            {"reason"}
        )
    }

    # ================= METRICS LOG =================
    log_by_lua_block {
        metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.host})
    }

    # =======================================================
    # METRICS SERVER (INTERNAL ONLY)
    # =======================================================
    server {
        listen 0.0.0.0:9145;

        location /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }

        location / {
            return 404;
        }
    }

    # =======================================================
    # HTTP (PORT 80) - ACME + HEALTH ONLY
    # =======================================================
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        # Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # ✅ HEALTH CHECK (FIX QUAN TRỌNG NHẤT)
        location = /health/ {
            proxy_pass http://app:8000/health/;
            access_log off;

            proxy_connect_timeout 2s;
            proxy_read_timeout    2s;
        }

        # Redirect toàn bộ còn lại sang HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =======================================================
    # HTTPS - MAIN SECURITY GATEWAY
    # =======================================================
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ================= SAFE BYPASS =================
        location = /health/ {
            proxy_pass http://app:8000/health/;
            access_log off;
        }

        location /static/ {
            proxy_pass http://app:8000;
            access_log off;
        }

        location /media/ {
            proxy_pass http://app:8000;
            access_log off;
        }

        # ================= SECURITY PIPELINE =================
        location / {
            access_by_lua_block {
                local modules = {
                    {bad_bot,      "bad_bot"},
                    {rate_limit,   "rate_limit"},
                    {ip_blacklist, "ip_blacklist"},
                    {waf,          "waf"},
                    {jwt_auth,     "jwt"}
                }

                for _, m in ipairs(modules) do
                    local ok, res = pcall(m[1].run)

                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] Module crash: ", m[2], " → ", res)
                    elseif res then
                        metric_blocked:inc(1, {m[2]})
                        return ngx.exit(res)
                    end
                end
            }

            proxy_pass http://app:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }
    }
}