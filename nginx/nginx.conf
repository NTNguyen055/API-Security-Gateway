worker_processes auto;

env JWT_SECRET_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    # Shared memory zones
    lua_shared_dict limit_req_store 10m;   # Rate limit state (lua-resty-limit-req)
    lua_shared_dict ip_blacklist    10m;   # Fail-open fallback khi Redis down
    lua_shared_dict jwt_cache       10m;   # JWT cache (dùng sau nếu cần)

    # Giới hạn request body — tránh large payload attack
    client_max_body_size 10m;

    # Custom log format cho security audit
    # Ghi: IP | time | request | status | UA | response_time
    log_format security '$remote_addr [$time_local] '
                        '"$request" $status '
                        '"$http_user_agent" '
                        'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    # -------------------------------------------------------
    # SERVER 1: HTTP (port 80)
    # - Certbot renewal: đi thẳng, không redirect
    # - /health/: bypass Lua, dùng cho Jenkinsfile health check
    # - Còn lại: redirect sang HTTPS
    # -------------------------------------------------------
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        # Certbot renewal — PHẢI trước location / redirect
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Health check qua HTTP — dùng cho Jenkins & docker healthcheck
        # Không redirect HTTPS để tránh vấn đề certificate trên localhost
        location /health/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # Tất cả traffic còn lại → redirect HTTPS 301
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # SERVER 2: HTTPS (port 443) — Adaptive Security Gateway
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Health check ───────────────────────────────────
        # Bypass toàn bộ security modules
        # Dùng cho monitoring và curl từ browser qua HTTPS
        location /health/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # ── Static files (khi USE_S3=False) ───────────────
        # Bypass security modules — static file không cần WAF/JWT
        location /static/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # ── Media files (khi USE_S3=False) ────────────────
        location /media/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # ── Main location — 5 module bảo mật chạy tuần tự ─
        location / {
            access_by_lua_block {
                -- M1: User-Agent filtering
                --   tier 1: scanner (sqlmap/nikto/nmap...) → 403
                --   tier 2: dev tools (curl/Postman...)    → log + pass
                --   tier 3: UA rỗng                        → 400
                require("1_bad_bot").run()

                -- M2: Rate limiting (leaky bucket, non-blocking)
                --   > 20 req/s burst → 429 Too Many Requests
                require("2_rate_limit").run()

                -- M3: IP blacklist (Redis lookup, fail-open)
                --   key blacklist:{ip} = "1" → 403 Forbidden
                require("3_ip_blacklist").run()

                -- M4: WAF SQLi / XSS
                --   check URI path + POST/PUT body
                require("4_waf_sqli_xss").run()

                -- M5: JWT validation (HS256)
                --   chỉ áp dụng /api/* — hệ thống hiện dùng
                --   session-based auth nên pass-through toàn bộ
                --   cho đến khi có /api/ endpoint thực sự
                require("5_jwt_auth").run()
            }

            proxy_pass         http://app:8000;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }
    }
}
