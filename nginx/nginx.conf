worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # BƯỚC 1: Bắt toàn bộ traffic HTTP (Port 80)
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        # Phục vụ Let's Encrypt khi nó cần renew (RẤT QUAN TRỌNG, không được xóa)
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Nếu không phải Let's Encrypt, "đá" tất cả người dùng sang HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # BƯỚC 2: Phục vụ traffic HTTPS (Port 443) an toàn
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        # Chỉ đường cho Nginx đọc 2 file chứng chỉ vừa xin được
        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        # Cấu hình bảo mật SSL nâng cao
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Đẩy traffic sạch và an toàn vào backend Django (Port 8000)
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}