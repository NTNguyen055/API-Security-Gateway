worker_processes auto;
worker_rlimit_nofile 65535;          # ✅ THÊM: khớp với ulimits trong compose

env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;

events {
    worker_connections 4096;         # ✅ TĂNG: 2048 → 4096 (khớp nofile)
    multi_accept on;
    use epoll;                       # ✅ THÊM: Linux epoll I/O model hiệu quả hơn
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # ================= HIDE SERVER BANNER =================
    server_tokens off;               # ✅ THÊM: không lộ version OpenResty

    # ================= REAL IP =================
    # ❗ CHỈ TRUST proxy nội bộ (Docker bridge = 172.16.0.0/12)
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;    # ✅ THÊM: AWS VPC internal range

    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_socket_log_errors off;
    lua_code_cache on;               # ✅ ĐẢMBẢO: bật trên production (default on)

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;
    lua_shared_dict rl_counter          5m;
    lua_shared_dict geo_cache           20m;
    lua_shared_dict redis_down          1m;

    resolver 127.0.0.11 ipv6=off valid=30s;

    # ================= BODY / TIMEOUT =================
    client_max_body_size    10m;
    client_body_buffer_size 128k;

    keepalive_timeout  15;
    keepalive_requests 500;          # ✅ THÊM: giới hạn req/connection
    reset_timedout_connection on;    # ✅ THÊM: giải phóng FIN_WAIT nhanh

    # ================= GZIP =================
    gzip on;
    gzip_min_length 1024;           # ✅ THÊM: tránh nén file nhỏ tốn CPU
    gzip_comp_level 5;              # ✅ THÊM: balance CPU vs size
    gzip_vary on;                   # ✅ THÊM: Vary: Accept-Encoding header
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ================= LOG =================
    log_format security '$remote_addr realip="$http_x_real_ip" xff="$http_x_forwarded_for" '
                        '[$time_local] "$request" $status $body_bytes_sent '
                        '"$http_user_agent" rt=$request_time '
                        'upstream_rt="$upstream_response_time"'; # ✅ THÊM upstream_rt

    access_log /usr/local/openresty/nginx/logs/access.log security buffer=16k flush=5s; # ✅ THÊM buffer
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LUA INIT =================
    init_by_lua_block {
        bad_bot          = require "bad_bot"
        rate_limit       = require "rate_limit"
        rate_limit_redis = require "rate_limit_redis"
        ip_blacklist     = require "ip_blacklist"
        waf              = require "waf_sqli_xss"
        jwt_auth         = require "jwt_auth"
        geo_block        = require "geo_block"
        xff_guard        = require "xff_guard"
        risk_engine      = require "risk_engine"
    }

    init_worker_by_lua_block {
        local prometheus_lib = require "prometheus"
        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total", "Total HTTP requests", {"host", "status"}
        )
        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds", "Latency", {"host"},
            {0.005, 0.01, 0.05, 0.1, 0.5, 1, 5}
        )
        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total", "Blocked requests", {"reason"}
        )
    }

    log_by_lua_block {
        if metric_requests then
            metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        end
        if metric_latency then
            metric_latency:observe(tonumber(ngx.var.request_time) or 0, {ngx.var.host})
        end
    }

    # ================= UPSTREAM =================
    upstream django_app {                           # ✅ THÊM: upstream block tường minh
        server app:8000;
        keepalive 32;                               # ✅ THÊM: HTTP keepalive pool
    }

    # ================= METRICS (internal only) =================
    server {
        listen 127.0.0.1:9145;
        server_tokens off;

        location = /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }

        location / {
            return 404;
        }
    }

    # ================= HTTP → HTTPS REDIRECT =================
    server {
        listen 80;
        server_name _;

        # ACME challenge phải TRƯỚC redirect
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            access_log off;
        }

        location = /health/ {
            return 200 "OK";
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS =================
    server {
        listen 443 ssl http2;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384; # ✅ THÊM: explicit cipher list
        ssl_prefer_server_ciphers off;              # ✅ TLS1.3 không cần

        ssl_session_cache   shared:SSL:10m;         # ✅ THÊM: session cache
        ssl_session_timeout 1d;
        ssl_session_tickets off;                    # ✅ THÊM: tắt tickets (forward secrecy)

        ssl_stapling        on;                     # ✅ THÊM: OCSP stapling
        ssl_stapling_verify on;

        # ================= SECURITY HEADERS =================
        add_header X-Frame-Options           "DENY"            always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header Referrer-Policy           "no-referrer"     always;
        add_header X-XSS-Protection          "1; mode=block"   always; # ✅ THÊM
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always; # ✅ THÊM

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        add_header Content-Security-Policy
            "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always; # ✅ THÊM frame-ancestors, base-uri, form-action

        # ================= HEALTH (bypass security pipeline) =================
        location = /health/ {
            proxy_pass http://django_app;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;

            access_log off;
        }

        # ================= STATIC (serve trực tiếp) =================
        location ^~ /static/ {                      # ✅ THÊM: không cần qua Django
            alias /var/www/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ================= MAIN SECURITY PIPELINE =================
        location / {
            lua_need_request_body on;

            access_by_lua_block {
                -- Pipeline thứ tự: blacklist → xff → geo → bot → rate → waf → jwt → risk
                local pipeline = {
                    { mod = ip_blacklist,     name = "ip_blacklist"    },
                    { mod = xff_guard,        name = "xff_guard"       },
                    { mod = geo_block,        name = "geo_block"       },
                    { mod = bad_bot,          name = "bad_bot"         },
                    { mod = rate_limit,       name = "rate_limit"      },
                    { mod = rate_limit_redis, name = "rate_limit_redis"},
                    { mod = waf,              name = "waf"             },
                    { mod = jwt_auth,         name = "jwt"             },
                    { mod = risk_engine,      name = "risk_engine"     },
                }

                for _, entry in ipairs(pipeline) do
                    local ok, res = pcall(entry.mod.run)
                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] Module crash: ", entry.name, " err=", res)
                    elseif res then
                        if metric_blocked then
                            metric_blocked:inc(1, {entry.name})
                        end
                        return ngx.exit(res)
                    end
                end
            }

            proxy_pass http://django_app;

            proxy_http_version 1.1;
            proxy_set_header Connection "";          # ✅ THÊM: required cho keepalive upstream

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_buffers         8 16k;
            proxy_buffer_size     32k;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ✅ THÊM: hide upstream error details
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        location = /50x.html {
            internal;
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
