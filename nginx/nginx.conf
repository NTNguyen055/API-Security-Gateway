worker_processes auto;

# ================= ENV =================
env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # ================= REAL IP (CRITICAL) =================
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.17.0.1;
    set_real_ip_from 172.18.0.1;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_socket_log_errors off;

    # ================= SHARED MEMORY =================
    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;
    lua_shared_dict rl_counter          5m;
    lua_shared_dict geo_cache           20m;

    # ================= NETWORK =================
    resolver 127.0.0.11 ipv6=off valid=30s;

    # ================= LIMIT & TIMEOUT =================
    client_max_body_size 10m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;

    keepalive_timeout 15;
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;

    # ================= CONNECTION LIMIT =================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ================= LOG =================
    log_format security '$remote_addr xff="$http_x_forwarded_for" '
                        '[$time_local] "$request" $status '
                        '"$http_user_agent" rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LUA INIT =================
    init_by_lua_block {
        bad_bot           = require "bad_bot"
        rate_limit        = require "rate_limit"
        rate_limit_redis  = require "rate_limit_redis"
        ip_blacklist      = require "ip_blacklist"
        waf               = require "waf_sqli_xss"
        jwt_auth          = require "jwt_auth"
        geo_block         = require "geo_block"
        xff_guard         = require "xff_guard"
    }

    init_worker_by_lua_block {
        local ok, prometheus_lib = pcall(require, "prometheus")
        if not ok then
            ngx.log(ngx.ERR, "[PROMETHEUS] Load failed: ", prometheus_lib)
            return
        end

        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Total HTTP requests",
            {"host", "status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Request latency",
            {"host"},
            {0.005,0.01,0.05,0.1,0.5,1,5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Blocked requests",
            {"reason"}
        )
    }

    log_by_lua_block {
        if metric_requests then
            metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        end
        if metric_latency then
            metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.host})
        end
    }

    # ================= METRICS (SECURE) =================
    server {
        listen 127.0.0.1:9145;

        location /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }

        location / { return 404; }
    }

    # ================= HTTP =================
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location = /health/ {
            return 200 "OK";
            access_log off;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS =================
    server {
        listen 443 ssl http2;
        server_name dacn3.duckdns.org;

        # ================= TLS =================
        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;

        # ================= SECURITY HEADERS =================
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer-when-downgrade;
        add_header Content-Security-Policy "default-src 'self'" always;

        # ================= LIMIT =================
        limit_conn conn_limit 20;

        # ================= SAFE ROUTES =================
        location = /health/ {
            proxy_pass http://app:8000;
            access_log off;
        }

        location /static/ { proxy_pass http://app:8000; access_log off; }
        location /media/  { proxy_pass http://app:8000; access_log off; }

        # ================= SECURITY PIPELINE =================
        location / {
            access_by_lua_block {

                local modules = {
                    {ip_blacklist,     "ip_blacklist"},
                    {xff_guard,        "xff_guard"},
                    {bad_bot,          "bad_bot"},
                    {geo_block,        "geo_block"},
                    {rate_limit,       "rate_limit"},
                    {rate_limit_redis, "rate_limit_redis"},
                    {waf,              "waf"},
                    {jwt_auth,         "jwt"}
                }

                for _, m in ipairs(modules) do
                    local ok, res = pcall(m[1].run)

                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] Crash: ", m[2], " err=", res)

                        if m[2] == "ip_blacklist" or m[2] == "xff_guard" then
                            return ngx.exit(500)
                        end
                    elseif res then
                        if metric_blocked then
                            metric_blocked:inc(1, {m[2]})
                        end
                        return ngx.exit(res)
                    end
                end
            }

            proxy_pass http://app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}