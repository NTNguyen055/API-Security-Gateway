services:

  app:
    image: ntnguyen055/api-security-app:latest
    container_name: docapp_django
    restart: unless-stopped

    expose:
      - "8000"

    env_file:
      - /home/ubuntu/appointment-web/.env

    depends_on:
      redis:
        condition: service_healthy

    command: >
      sh -c "
      until python manage.py migrate; do sleep 3; done &&
      python manage.py collectstatic --noinput &&
      gunicorn docappsystem.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

    networks:
      - internal


  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: unless-stopped

    command: >
      redis-server
      --maxmemory 50mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

    networks:
      - internal


  gateway:
    image: ntnguyen055/api-security-gateway:latest
    container_name: openresty_gateway
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:9145:9145"

    env_file:
      - /home/ubuntu/appointment-web/.env

    environment:
      RATE_LIMIT_RPS: 10
      RATE_LIMIT_BURST: 20
      REDIS_RATE_LIMIT: 30
      REDIS_RL_WINDOW: 60
      AUTO_BL_THRESHOLD: 5
      AUTO_BL_WINDOW: 60
      AUTO_BL_DURATION: 3600

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html:ro
      - ./logs/nginx:/usr/local/openresty/nginx/logs

    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-A", "HealthChecker/1.0",
             "-H", "Host: dacn3.duckdns.org",
             "-H", "X-Forwarded-For: 127.0.0.1",
             "http://localhost/health/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - internal

    ulimits:
      nofile:
        soft: 65535
        hard: 65535


networks:
  internal:
    driver: bridge
    # Đã xoá 'internal: true' ở đây để App có thể kết nối RDS và S3

volumes:
  redis_data: