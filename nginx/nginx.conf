worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # Server block cho Port 80
    server {
        listen 80;
        server_name yourdomain.com; # <--- THAY BẰNG DOMAIN CỦA BẠN

        # Phục vụ Let's Encrypt xác thực (ACME Challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Tự động redirect sang HTTPS (Sẽ bật sau khi đã có Cert)
        # location / {
        #     return 301 https://$host$request_uri;
        # }
        
        # Tạm thời dẫn thẳng vào App để cấp cert lần đầu
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Server block cho Port 443 (HTTPS) - Sẽ bật cấu hình chi tiết ở Bước 5
}