# =============================================================================
# Adaptive Web Security Gateway — nginx.conf
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

# ================= ENV DECLARATIONS =================
# Tất cả biến env dùng trong Lua phải khai báo ở đây
env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;
env RISK_BLOCK_THRESHOLD;
env RISK_LIMIT_THRESHOLD;

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Ẩn version nginx khỏi response header ──────────────────
    server_tokens off;

    # ================= LUA =================
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_socket_log_errors off;

    # ================= REAL IP =================
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # FIX 1: Thu hẹp sự tin tưởng, chỉ nhận X-Forwarded-For từ nội bộ Docker và AWS VPC
    set_real_ip_from  127.0.0.1;
    set_real_ip_from  172.20.0.0/24; # Docker Subnet
    set_real_ip_from  172.31.0.0/16; # AWS EC2 VPC Subnet

    # ================= SHARED MEMORY =================
    # FIX 2: Bổ sung ip_cache để phục vụ cho các file Lua (bad_bot, rate_limit)
    lua_shared_dict limit_req_store    10m;
    lua_shared_dict ip_cache           10m; 
    lua_shared_dict jwt_cache          10m;
    lua_shared_dict prometheus_metrics 10m;
    lua_shared_dict rl_counter         10m;
    lua_shared_dict geo_cache          20m;

    resolver 127.0.0.11 ipv6=off valid=30s;

    # FIX 3: Khai báo upstream để tái sử dụng kết nối (Keepalive), giảm tải CPU
    upstream django_backend {
        server docapp_django:8000;
        keepalive 32; # Giữ 32 kết nối TCP mở sẵn
    }

    # ================= REQUEST LIMITS =================
    client_max_body_size    10m;
    client_body_buffer_size 256k;
    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            10s;

    # ================= LOG FORMAT =================
    # FIX 4: Thêm chi tiết Risk, Block status và Response Time vào log
    log_format security '[$time_local] $remote_addr - ReqID:$request_id - $status "$request" '
                        'Risk:$http_x_risk_score Blocked:$http_x_security_block '
                        'RT:$request_time UpRT:$upstream_response_time ua="$http_user_agent"';

    access_log /usr/local/openresty/nginx/logs/access.log security buffer=16k flush=5s;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # ================= LOAD LUA MODULES =================
    init_by_lua_block {

        # Khởi tạo MaxMindDB chia sẻ RAM cho các Worker
        require("resty.maxminddb").init("/etc/nginx/geoip/GeoLite2-Country.mmdb")

        ip_blacklist     = require "ip_blacklist"
        xff_guard        = require "xff_guard"
        geo_block        = require "geo_block"
        bad_bot          = require "bad_bot"
        rate_limit       = require "rate_limit"
        rate_limit_redis = require "rate_limit_redis"
        waf              = require "waf_sqli_xss"
        jwt_auth         = require "jwt_auth"
        risk_engine      = require "risk_engine"

        ngx.log(ngx.NOTICE, "[GATEWAY] All security modules loaded OK")
    }

    # ================= PROMETHEUS =================
    init_worker_by_lua_block {
        local ok, prometheus_lib = pcall(require, "prometheus")
        if not ok then
            ngx.log(ngx.ERR, "[PROMETHEUS] load failed: ", prometheus_lib)
            return
        end

        -- FIX: Chỉ khởi tạo metric nếu nó chưa tồn tại (ngăn duplicate khi có nhiều worker)
        if not prometheus then
            prometheus = prometheus_lib.init("prometheus_metrics")

            metric_requests = prometheus:counter(
                "nginx_http_requests_total", "Total HTTP requests", {"host", "status"}
            )
            metric_latency = prometheus:histogram(
                "nginx_http_request_duration_seconds", "Request latency", {"host"},
                {0.005, 0.01, 0.05, 0.1, 0.5, 1, 5}
            )
            metric_blocked = prometheus:counter(
                "nginx_security_blocked_total", "Blocked requests by security module", {"reason"}
            )
            metric_risk = prometheus:histogram(
                "nginx_security_risk_score", "Request risk score distribution", {"action"},
                {0, 10, 20, 30, 50, 70, 80, 100}
            )
        end
    }

    log_by_lua_block {
        if metric_requests then metric_requests:inc(1, {ngx.var.host, ngx.var.status}) end
        if metric_latency then metric_latency:observe(tonumber(ngx.var.request_time) or 0, {ngx.var.host}) end
        if metric_risk and ngx.ctx.security then
            local risk   = ngx.ctx.security.risk_final or 0
            local action = ngx.ctx.security.risk_action or "pass"
            metric_risk:observe(risk, {action})
        end
    }

    # =============================================================================
    # SERVER: PROMETHEUS METRICS (internal only)
    # =============================================================================
    server {
        listen 127.0.0.1:9145;
        location /metrics {
            allow 127.0.0.1;
            deny  all;
            content_by_lua_block {
                if prometheus then prometheus:collect() else ngx.exit(503) end
            }
            access_log off;
        }
        location / { return 404; }
    }

    # =============================================================================
    # SERVER: HTTP → HTTPS REDIRECT
    # =============================================================================
    server {
        listen      80;
        server_name dacn3.duckdns.org;

        location = /health/ {
            add_header X-Forwarded-Proto "http";
            return 200 "OK";
            access_log off;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # SERVER: HTTPS (MAIN)
    # =============================================================================
    server {
        listen      443 ssl;
        server_name dacn3.duckdns.org;

        # ── TLS ─────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        ssl_stapling        on;
        ssl_stapling_verify on;
        
        # ── SECURITY HEADERS ─────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                  always;
        add_header X-Content-Type-Options    "nosniff"                     always;
        add_header X-Request-ID              $request_id                   always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.amazonaws.com; style-src 'self' 'unsafe-inline' https://*.amazonaws.com; img-src 'self' data: https://*.amazonaws.com; font-src 'self' data: https://*.amazonaws.com; connect-src 'self';"
            always;

        # ── HEALTH CHECK ─────────────────────────────────────────
        location = /health/ {
            # FIX 5: Chặn Hacker quét port, chỉ cho LAN / VPC truy cập Healthcheck
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            allow 172.31.0.0/16;
            deny all;

            proxy_pass http://django_backend;
            
            proxy_set_header Host  $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_connect_timeout  3s;
            proxy_read_timeout     3s;
            access_log off;
        }

        # ── STATIC / MEDIA ───────────────────────────────────────
        location /static/ {
            # FIX 6: Chống Path Traversal (Quét thư mục) trên Static/Media
            access_by_lua_block {
                local ctx = { security = { risk = 0 } }
                local modules = { ip_blacklist, bad_bot }
                for _, m in ipairs(modules) do
                    local ok, err = pcall(m.run, ctx)
                    if ctx.security.block then return ngx.exit(403) end
                end
            }
            proxy_pass http://django_backend;
            proxy_cache_valid 200 1d;
            access_log   off;
        }

        location /media/ {
            access_by_lua_block {
                local ctx = { security = { risk = 0 } }
                local modules = { ip_blacklist, bad_bot }
                for _, m in ipairs(modules) do
                    local ok, err = pcall(m.run, ctx)
                    if ctx.security.block then return ngx.exit(403) end
                end
            }
            proxy_pass http://django_backend;
            access_log   off;
        }

        # ── ADMIN: restrict thêm ─────────────────────────────────
        location /admin/ {
            access_by_lua_block {
                local ctx = { security = { risk = 0 }, admin_path = true }

                # FIX 7: Bổ sung đầy đủ 8 lớp lá chắn cho trang Admin
                local modules = {
                    xff_guard,
                    ip_blacklist,
                    geo_block,        -- [MỚI]
                    bad_bot,
                    rate_limit,
                    rate_limit_redis, -- [MỚI]
                    jwt_auth,
                    waf,
                }

                for _, m in ipairs(modules) do
                    if ctx.security.block then break end
                    local ok, err = pcall(m.run, ctx)
                    if not ok then ngx.log(ngx.ERR, "[ADMIN][SECURITY] crash: ", err) end
                end

                local ok, err = pcall(risk_engine.run, ctx)
                if not ok then ngx.log(ngx.ERR, "[ADMIN][RISK] crash: ", err) end

                local action = (ctx.security and ctx.security.risk_action) or ""
                if ctx.security.block or action == "block" then
                    return ngx.exit(403)
                end
                if action == "limit" then return ngx.exit(429) end
                ngx.ctx.security = ctx.security
            }

            proxy_pass http://django_backend;
            
            proxy_http_version     1.1;
            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     10s;
        }

        # ── SECURITY PIPELINE (main) ─────────────────────────────
        location / {
            access_by_lua_block {
                local ctx = { security = { risk = 0 } }

                local modules = {
                    xff_guard,        
                    ip_blacklist,     
                    geo_block,        
                    bad_bot,          
                    rate_limit,       
                    rate_limit_redis, 
                    waf,              
                    jwt_auth,         
                }

                for _, m in ipairs(modules) do
                    if ctx.security.block then break end
                    local ok, err = pcall(m.run, ctx)
                    if not ok then ngx.log(ngx.ERR, "[SECURITY] module crash: ", err) end
                end

                local ok, err = pcall(risk_engine.run, ctx)
                if not ok then ngx.log(ngx.ERR, "[RISK] crash: ", err) end

                ngx.ctx.security = ctx.security
                local action = (ctx.security and ctx.security.risk_action) or ""

                if ctx.security.block or action == "block" then return ngx.exit(403) end
                if action == "limit" then return ngx.exit(429) end
            }

            proxy_pass http://django_backend;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            proxy_buffering    on;
            proxy_buffers      16 16k;
            proxy_buffer_size  32k;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }
    }
}