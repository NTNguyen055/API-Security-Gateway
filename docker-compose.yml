version: "3.9"

# ======================================================
# API Security Gateway – docker-compose.yml (optimized)
# ======================================================

services:

  # ==================== DJANGO APP ====================
  app:
    image: ntnguyen055/api-security-app:latest
    container_name: docapp_django
    restart: unless-stopped

    expose:
      - "8000"

    env_file:
      - /home/ubuntu/appointment-web/.env

    environment:
      - TZ=Asia/Ho_Chi_Minh

    networks:
      - backend

    depends_on:
      redis:
        condition: service_healthy

    # ✅ THÊM: hardening cho app container
    security_opt:
      - no-new-privileges:true

    # ✅ THÊM: giới hạn tài nguyên
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s          # ✅ FIX: tăng từ 3s → 5s (Django cold start)
      retries: 5
      start_period: 30s    # ✅ FIX: tăng từ 20s → 30s (migrate có thể chậm)


  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: unless-stopped

    # ✅ NOTE: password đã đúng nhưng nên đưa vào .env thay vì hardcode
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes

    volumes:
      - redis_data:/data

    environment:
      - TZ=Asia/Ho_Chi_Minh

    networks:
      - backend

    # ✅ THÊM: hardening – Redis không cần expose ra ngoài
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s    # ✅ THÊM


  # ==================== OPENRESTY GATEWAY ====================
  gateway:
    image: ntnguyen055/api-security-gateway:latest
    container_name: openresty_gateway
    restart: unless-stopped

    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "127.0.0.1:9145:9145"   # metrics chỉ bind localhost

    env_file:
      - /home/ubuntu/appointment-web/.env

    environment:
      - TZ=Asia/Ho_Chi_Minh

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html:ro

    networks:
      - backend

    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp
      - /usr/local/openresty/nginx/client_body_temp  # ✅ THÊM: nginx cần ghi temp
      - /usr/local/openresty/nginx/proxy_temp
      - /usr/local/openresty/nginx/logs

    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-A", "HealthChecker/1.0",
             "http://127.0.0.1/health/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M


# ==================== NETWORK ====================
networks:
  backend:
    driver: bridge
    ipam:                          # ✅ THÊM: subnet tường minh
      config:
        - subnet: 172.20.0.0/24

# ==================== VOLUMES ====================
volumes:
  redis_data:
    driver: local
