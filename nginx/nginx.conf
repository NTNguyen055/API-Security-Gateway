worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # [1] Chuyển hướng toàn bộ HTTP sang HTTPS
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # [2] Cấu hình HTTPS (Port 443)
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        # Đường dẫn tới chứng chỉ Let's Encrypt (đã mount vào container)
        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        # Tối ưu bảo mật SSL
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}