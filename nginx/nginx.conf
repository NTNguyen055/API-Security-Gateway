worker_processes auto;

env JWT_SECRET_KEY;
env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_RATE_LIMIT;
env REDIS_RL_WINDOW;
env AUTO_BL_THRESHOLD;
env AUTO_BL_WINDOW;
env AUTO_BL_DURATION;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_socket_log_errors off;

    lua_shared_dict limit_req_store     10m;
    lua_shared_dict ip_blacklist        10m;
    lua_shared_dict jwt_cache           10m;
    lua_shared_dict prometheus_metrics  10m;
    lua_shared_dict rl_counter          5m;   -- auto-blacklist reject counter
    lua_shared_dict geo_cache           20m;  -- geo-blocking country cache

    resolver 127.0.0.11 ipv6=off;
    client_max_body_size 10m;

    log_format security '$remote_addr [$time_local] "$request" $status '
                        '"$http_user_agent" rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log security;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    init_by_lua_block {
        bad_bot           = require "bad_bot"
        rate_limit        = require "rate_limit"
        rate_limit_redis  = require "rate_limit_redis"
        ip_blacklist      = require "ip_blacklist"
        waf               = require "waf_sqli_xss"
        jwt_auth          = require "jwt_auth"
        geo_block         = require "geo_block"
    }

    init_worker_by_lua_block {
        local ok, prometheus_lib = pcall(require, "prometheus")
        if not ok then
            ngx.log(ngx.ERR, "[PROMETHEUS] Failed to load: ", prometheus_lib)
            return
        end

        prometheus = prometheus_lib.init("prometheus_metrics")

        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Total HTTP requests",
            {"host", "status"}
        )

        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "Request latency",
            {"host"},
            {0.005,0.01,0.05,0.1,0.5,1,5}
        )

        metric_blocked = prometheus:counter(
            "nginx_security_blocked_total",
            "Blocked requests",
            {"reason"}
        )
    }

    log_by_lua_block {
        if metric_requests then
            metric_requests:inc(1, {ngx.var.host, ngx.var.status})
        end
        if metric_latency then
            metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.host})
        end
    }

    # ================= METRICS =================
    server {
        listen 0.0.0.0:9145;

        location /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
            access_log off;
        }

        location / { return 404; }
    }

    # ================= HTTP =================
    server {
        listen 80;
        server_name dacn3.duckdns.org;

        # ✅ Health check: trả về 200 thẳng, không qua Lua, không qua app
        # Dùng cho Jenkins CI/CD pipeline health check
        location = /health/ {
            add_header Content-Type text/plain;
            return 200 "OK";
            access_log off;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS =================
    server {
        listen 443 ssl;
        server_name dacn3.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/dacn3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dacn3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        # ================= SAFE ROUTES =================

        # ✅ Health check HTTPS: proxy thẳng đến app, không qua Lua security
        location = /health/ {
            proxy_pass http://app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            access_log off;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location /static/ { proxy_pass http://app:8000; access_log off; }
        location /media/  { proxy_pass http://app:8000; access_log off; }

        # ================= SECURITY PIPELINE =================
        location / {
            access_by_lua_block {
                --[[
                    SECURITY PIPELINE — thứ tự tối ưu:
                    1. ip_blacklist    → chặn IP đã biết ngay từ đầu (nhanh nhất, L1 cache)
                    2. geo_block       → chặn quốc gia không cho phép
                    3. bad_bot         → chặn scanner/UA rỗng
                    4. rate_limit      → giới hạn tốc độ + auto-blacklist (shared memory)
                    5. rate_limit_redis→ distributed rate limit (Redis sliding window)
                    6. waf             → kiểm tra SQLi/XSS payload
                    7. jwt_auth        → xác thực JWT cho /api/*
                ]]
                local modules = {
                    {ip_blacklist,     "ip_blacklist"},
                    {geo_block,        "geo_block"},
                    {bad_bot,          "bad_bot"},
                    {rate_limit,       "rate_limit"},
                    {rate_limit_redis, "rate_limit_redis"},
                    {waf,              "waf"},
                    {jwt_auth,         "jwt"}
                }

                for _, m in ipairs(modules) do
                    local ok, res = pcall(m[1].run)

                    if not ok then
                        ngx.log(ngx.ERR, "[SECURITY] Module crash: ", m[2], " err=", res)
                    elseif res then
                        if metric_blocked then
                            metric_blocked:inc(1, {m[2]})
                        end
                        return ngx.exit(res)
                    end
                end
            }

            proxy_pass http://app:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}
