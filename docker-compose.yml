version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: docapp_redis
    restart: always

  app:
    image: ntnguyen055/api-security-app:v1
    container_name: docapp_django
    restart: always
    env_file: 
      - ../.env
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn docappsystem.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    depends_on:
      - redis